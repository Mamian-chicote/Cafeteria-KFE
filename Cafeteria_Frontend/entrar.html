<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | K-FE Escolar</title>
    <link rel="stylesheet" href="css/styles.css"> 
</head>
<body class="body-login">

    <div class="login-container-page">
        <div class="login-card">
            <h2>Crear Cuenta</h2>
            <p>Bienvenido, regístrate para acceder al menú</p>
            
            <form id="registro-form">
                <label for="nombre">Nombre Completo</label>
                <input type="text" id="nombre" required>
                
                <label for="correo">Correo Institucional</label>
                <input type="email" id="correo" required>
                
                <label for="password">Contraseña</label>
                <input type="password" id="password" required>
                
                <button type="submit" style="margin-top: 20px;">Registrarse</button>
            </form>
            
            <p style="margin-top: 20px;">
                ¿Ya tienes cuenta? <a href="login.html" style="color: var(--neon-blue);">Inicia sesión aquí</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('registro-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const data = {
                nombre: document.getElementById('nombre').value,
                correo: document.getElementById('correo').value,
                password: document.getElementById('password').value
            };

            const response = await fetch('registrar.php', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(data)
            });
            const result = await response.json();

            if (result.status === "success") {
                alert("¡Registro exitoso! Ya puedes iniciar sesión.");
                window.location.href = "login.html";
            } else {
                alert("Error: " + result.message);
            }
        });
    </script>
</body>
</html>
