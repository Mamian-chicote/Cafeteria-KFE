<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-S-D - La K-FE Escolar</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <style>
        @media print {
            body * { visibility: hidden; }
            #area-ticket, #area-ticket * { visibility: visible; }
            #area-ticket { position: absolute; left: 0; top: 0; }
        }
    </style>
</head>
<body style="background: linear-gradient(rgba(10, 11, 16, 0.85), rgba(10, 11, 16, 0.85)), url('https://images.unsplash.com/photo-1509042239860-f550ce710b93'); background-size: cover; background-position: center; background-attachment: fixed; background-repeat: no-repeat; margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0a0b10; color: #e0e0e0; padding-top: 70px;">
    <script>
        if (sessionStorage.getItem("sesion_activa") !== "true") {
            window.location.href = "entrar.html";
        }
    </script>
    <nav class="navbar">
        <div class="nav-container">
            <span class="nav-logo">L-S-D K-FE</span>
            <button onclick="cerrarSesion()">Cerrar Sesión</button>
        </div>
    </nav>

    <main>
        <section id="menu-completo" class="card-section">
            <h2>🍔 Menú Completo Digital</h2>
            <table class="tabla-menu">
                <thead><tr><th>Producto</th><th>Precio</th><th>Acción</th></tr></thead>
                <tbody id="menu-dinamico"></tbody>
            </table>
        </section>

        <section id="encuesta" class="card-section">
            <h2>📝 Encuesta de Satisfacción</h2>
            <form id="form-satisfaccion">
                <label for="nombre">Nombre Completo:</label>
                <input type="text" id="nombre" name="nombre">
                <label for="correo">Correo:</label>
                <input type="email" id="correo" name="correo">
                <label for="telefono">Teléfono:</label>
                <input type="tel" id="telefono" name="telefono">
                <label for="grupo">Grupo y Turno:</label>
                <input type="text" id="grupo" name="grupo">
                <label for="calificacion">Calificación:</label>
                <select id="calificacion" name="calificacion">
                    <option value="excelente">Excelente</option>
                    <option value="bueno">Bueno</option>
                </select>
                <label for="comentarios">Comentarios:</label>
                <textarea id="comentarios" name="comentarios"></textarea>
                <button type="submit">Enviar Comentarios</button>
            </form>
        </section>
    </main>

    <div class="carrito-flotante" id="carrito">
        <h3>🛒 Tu Pedido</h3>
        <ul id="lista-carrito"><li class="vacio">El carrito está vacío</li></ul>
        <div class="total-container">
            <strong>Total: $<span id="total-precio">0</span></strong>
            <button id="btn-pagar">Finalizar Pedido</button>
        </div>

        <div id="resumen-pago" style="display:none; padding: 10px; background: #eee; margin-top: 10px;">
            <h3>Confirmar Pago</h3>
            <ul id="lista-resumen"></ul>
            <p><strong>Total: $<span id="monto-final">0</span></strong></p>
            <select id="metodo-pago">
                <option value="efectivo">Efectivo</option>
                <option value="transferencia">Transferencia</option>
                <option value="tarjeta">Tarjeta</option>
            </select>
            <button onclick="confirmarPago()">Confirmar y Pedir</button>
        </div>
    </div>

    <div id="area-ticket" style="display:none; font-family: 'Courier New', Courier, monospace; width: 250px; padding: 10px; border: 1px dashed #000;">
        <h2 style="text-align: center;">K-FE ESCOLAR</h2>
        <p>Fecha: <span id="ticket-fecha"></span></p>
        <hr>
        <ul id="ticket-productos" style="list-style: none; padding: 0;"></ul>
        <hr>
        <p style="text-align: right;"><strong>Total: $<span id="ticket-total"></span></strong></p>
        <p style="text-align: center;">¡Gracias por tu compra!</p>
    </div>

    <script>
        function cerrarSesion() {
            sessionStorage.removeItem("sesion_activa");
            window.location.href = "entrar.html";
        }

        fetch('api.php').then(res => res.json()).then(data => {
            const tbody = document.getElementById('menu-dinamico');
            data.forEach(prod => {
                tbody.innerHTML += `<tr><td>${prod.nombre}</td><td>$${prod.precio}</td>
                <td><button class="btn-agregar" data-nombre="${prod.nombre}" data-precio="${prod.precio}">Agregar</button></td></tr>`;
            });
        });

        document.addEventListener('click', (e) => {
            if (e.target.classList.contains('btn-agregar')) {
                const nombre = e.target.dataset.nombre;
                const precio = parseFloat(e.target.dataset.precio);
                const lista = document.getElementById("lista-carrito");
                const totalTxt = document.getElementById("total-precio");
                lista.innerHTML += `<li>${nombre} - $${precio.toFixed(2)}</li>`;
                totalTxt.textContent = (parseFloat(totalTxt.textContent) + precio).toFixed(2);
            }
        });

        document.getElementById("btn-pagar").addEventListener("click", () => {
            if (document.getElementById("lista-carrito").children.length === 0) return alert("Carrito vacío");
            document.getElementById("lista-resumen").innerHTML = document.getElementById("lista-carrito").innerHTML;
            document.getElementById("monto-final").textContent = document.getElementById("total-precio").textContent;
            document.getElementById("resumen-pago").style.display = "block";
        });

        function confirmarPago() {
            const nombre = prompt("¿A nombre de quién es el pedido?");
            if (!nombre) return;
            const total = document.getElementById("monto-final").textContent;
            const metodo = document.getElementById("metodo-pago").value;

            fetch('guardar_pedido.php', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nombre, productos: document.getElementById("lista-resumen").innerText, total, metodo })
            }).then(() => {
                document.getElementById("ticket-fecha").textContent = new Date().toLocaleString();
                document.getElementById("ticket-productos").innerHTML = document.getElementById("lista-resumen").innerHTML;
                document.getElementById("ticket-total").textContent = total;
                document.getElementById("area-ticket").style.display = "block";
                window.print();
                location.reload();
            });
        }
    </script>
</body>
</html>
